<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Your Roadmap - CareerRecipe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">🍳 CareerRecipe</div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/create">Share Roadmap</a></li>
                <li><a href="/community">Community</a></li>
                <li><a href="/trending">Trending</a></li>
            </ul>
        </div>
    </nav>

    <section class="form-section">
        <div class="container">
            <h1>Share Your Career Roadmap</h1>
            <p class="subtitle">Your identity is completely anonymous. Be honest and help thousands of future professionals make better career decisions.</p>

            <form class="roadmap-form" id="roadmapForm">
                <div class="form-group">
                    <label>📖 Roadmap Title</label>
                    <input type="text" name="title" placeholder="e.g., From College to Senior Tech PM in 5 Years" required>
                </div>

                <div class="form-group">
                    <label>🎯 Career Field</label>
                    <input type="text" name="field" placeholder="e.g., Product Management, Software Engineering, UX Design" required>
                </div>

                <div class="form-group">
                    <label>⏱️ Time Duration</label>
                    <input type="text" name="duration" placeholder="e.g., 3 years, 6 months">
                </div>

                <div class="form-group">
                    <label>📝 Journey Overview</label>
                    <textarea name="description" placeholder="Briefly describe your career journey. What was your starting point and where did it lead?" rows="4" required></textarea>
                </div>

                <div class="form-group">
                    <label>🎉 Successes & Achievements</label>
                    <textarea name="successes" placeholder="What went well? What milestones did you achieve? What are you proud of?" rows="5" required></textarea>
                </div>

                <div class="form-group">
                    <label>😤 Challenges & Failures</label>
                    <textarea name="challenges" placeholder="What was difficult? What failures did you experience? What didn't work out?" rows="5" required></textarea>
                </div>

                <div class="form-group">
                    <label>💡 Key Lessons Learned</label>
                    <textarea name="lessons" placeholder="What did you learn from this journey? What would you do differently?" rows="5" required></textarea>
                </div>

                <div class="form-group">
                    <label>🚀 Tips for Others</label>
                    <textarea name="tips" placeholder="What advice would you give to someone just starting this career journey?" rows="5" required></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-large">✨ Share Your Story</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 CareerRecipe. Your stories, anonymous and impactful.</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
    <script>
        document.getElementById('roadmapForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                const response = await fetch('/create', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    alert('✅ Thank you for sharing! Your roadmap is now live.');
                    window.location.href = '/community';
                }
            } catch (error) {
                alert('Error submitting form');
            }
        });
    </script>
</body>
</html>
